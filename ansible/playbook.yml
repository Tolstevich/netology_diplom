---
- name: Install nginx webservers
  hosts: webservers
  become: yes
  roles:
    - nginx

- name: Install Elasticsearch
  hosts: elasticsearch
  become: yes
  roles:
    - role: elasticsearch

- name: Install Filebeat on web servers
  hosts: webservers
  become: yes
  roles:
    - role: filebeat

- name: Install Kibana
  hosts: kibana
  become: yes
  roles:
    - role: kibana

- name: Setup PostgreSQL for Zabbix
  hosts: zabbix
  become: yes
  roles:
    - role: zabbix-db
    - role: community.zabbix.zabbix_server
    - role: community.zabbix.zabbix_web
    - role: zabbix-web-config

- name: Install Zabbix Agent on all hosts
  hosts: all
  become: yes
  roles:
    - role: community.zabbix.zabbix_agent

