---
- name: install nginx
  apt:
    name: nginx
    state: present
    update_cache: true


- name: push index
  template:
    src: index.html
    dest: /var/www/html/index.html
    owner: www-data
    group: www-data
    mode: '0644'

- name: start nginx
  systemd:
    name: nginx
    state: started
    enabled: yes