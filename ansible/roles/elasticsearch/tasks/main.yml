---
- name: java
  apt:
    name: openjdk-17-jre-headless
    state: present
    update_cache: yes

- name: install transport-https
  apt:
    name: apt-transport-https
    state: present

- name: add repository for elastic --- (Yandex mirror)
  shell: |
    echo "deb [trusted=yes] https://mirror.yandex.ru/mirrors/elastic/8/ stable main" | tee /etc/apt/sources.list.d/elastic-8.x.list
    apt update
  args:
    creates: /etc/apt/sources.list.d/elastic-8.x.list

- name: install elasticsearch
  apt:
    name: elasticsearch
    state: present
    update_cache: yes

- name: log directory
  file:
    path: /var/log/elasticsearch
    state: directory
    owner: elasticsearch
    group: elasticsearch
    mode: '0755'

- name: data directory
  file:
    path: /var/lib/elasticsearch
    state: directory
    owner: elasticsearch
    group: elasticsearch
    mode: '0755'

- name: configure elastic
  template:
    src: elasticsearch.yml.j2
    dest: /etc/elasticsearch/elasticsearch.yml
    owner: root
    group: elasticsearch
    mode: '0640'
  notify: restart elasticsearch

- name: start and enabled elastic
  systemd:
    name: elasticsearch
    state: started
    enabled: yes

- name: wait to ready
  uri:
    url: "http://localhost:9200"
    status_code: 200
  register: result
  until: result.status == 200
  retries: 60
  delay: 5