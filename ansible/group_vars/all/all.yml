---
ansible_user: ansible

# Zabbix 
zabbix_version: "7.0"
zabbix_server_dbhost: "localhost"
zabbix_server_dbport: 5432
zabbix_server_database_creation: false
zabbix_server_manage_database: false
zabbix_server_database_sqlload: false

# PostgreSQL
zabbix_server_pgsql_login_user: "postgres"
zabbix_server_pgsql_login_unix_socket: "/var/run/postgresql"

# Zabbix Agent
zabbix_agent_server: "zabbix.ru-central1.internal"
zabbix_agent_serveractive: "zabbix.ru-central1.internal"
zabbix_agent_hostname: "{{ ansible_hostname }}"